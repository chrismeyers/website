name: CI/CD
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_LIGHTGALLERY_LICENSE: ${{ secrets.PUBLIC_LIGHTGALLERY_LICENSE }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
      - run: npm ci
      - name: Verify install script allowlist
        run: |
          pending=$(npm approve-scripts --allow-scripts-pending)
          echo "$pending"
          if ! echo "$pending" | grep -q 'No packages with unreviewed install scripts'; then
            echo '::error::allowScripts in package.json is out of date. Review pending packages and run `npm approve-scripts`.'
            exit 1
          fi
      - run: npm run build
      - run: npm run check
      - run: npm run format
      - run: npm run lint
      - run: npm run test:ci
  deploy:
    runs-on: ubuntu-latest
    env:
      PUBLIC_LIGHTGALLERY_LICENSE: ${{ secrets.PUBLIC_LIGHTGALLERY_LICENSE }}
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[deploy skip]') &&
      !contains(github.event.head_commit.message, '[skip deploy]')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
